<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Runchr</title>
  <meta name="description" content="runchr builds small, useful, shippable services." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: rgba(255,255,255,0.03);
      --panel-2: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.1);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.72);
      --soft: rgba(255,255,255,0.55);
      --faint: rgba(255,255,255,0.42);
      --radius-xl: 32px;
      --radius-md: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top, rgba(255,255,255,0.05), transparent 32%), var(--bg);
      color: var(--text);
      font-family: "Inter", system-ui, sans-serif;
    }
    a { color: inherit; text-decoration: none; }
    .container { width: min(1120px, calc(100% - 48px)); margin: 0 auto; position: relative; z-index: 1; }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
      pointer-events: none;
      z-index: 0;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 30;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,10,0.82);
      backdrop-filter: blur(14px);
    }
    .site-header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 72px;
      gap: 20px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.04em;
      font-family: "Space Grotesk", sans-serif;
    }
    .header-right, .nav { display: flex; align-items: center; gap: 20px; }
    .nav { font-size: 14px; color: var(--muted); }
    .nav a:hover { color: var(--text); }

    .lang-switch {
      display: inline-flex;
      padding: 4px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      border-radius: 999px;
    }
    .lang-button {
      border: 0;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      color: var(--soft);
      background: transparent;
      cursor: pointer;
    }
    .lang-button.active { background: #fff; color: #0a0a0a; }

    section { padding: 36px 0; }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
      gap: 32px;
      padding: 72px 0;
    }
    .badge {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: var(--panel-2);
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--soft);
    }
    .hero-title {
      margin: 24px 0 0;
      font-size: clamp(44px, 7vw, 76px);
      line-height: 1.03;
      font-weight: 600;
      font-family: "Space Grotesk", sans-serif;
    }
    .hero-title .muted-line { display: block; color: var(--soft); }
    .hero-desc { margin-top: 24px; line-height: 1.8; font-size: 18px; color: var(--muted); }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 30px; }

    .button-primary, .button-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 20px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.14);
      transition: 160ms ease;
    }
    .button-primary { background: #fff; color: #0a0a0a; font-weight: 600; border-color: #fff; }
    .button-secondary { color: rgba(255,255,255,0.9); }
    .button-primary:hover, .button-secondary:hover { transform: translateY(-2px); background: var(--panel-2); }
    .button-primary:hover { background: #f0f0f0; }

    .card {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: var(--radius-xl);
      padding: 24px;
    }
    .section-label { font-size: 12px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--faint); }
    .section-title {
      margin: 14px 0 0;
      font-size: clamp(30px, 4vw, 44px);
      line-height: 1.12;
      font-family: "Space Grotesk", sans-serif;
    }
    .section-desc { line-height: 1.85; font-size: 16px; color: var(--muted); }

    .service-preview {
      margin-top: 24px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: rgba(0,0,0,0.24);
      padding: 22px;
      display: grid;
      gap: 12px;
    }
    .service-preview h3 {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: 30px;
    }
    .service-preview p { margin: 0; color: var(--muted); line-height: 1.75; }
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }
    .preview-card {
      display: block;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      padding: 16px;
      transition: 160ms ease;
    }
    .preview-card:hover { transform: translateY(-2px); background: var(--panel-2); }
    .preview-tag { color: var(--faint); font-size: 12px; }
    .preview-name { margin-top: 8px; font-weight: 600; font-family: "Space Grotesk", sans-serif; }
    .preview-desc { margin-top: 8px; color: var(--muted); font-size: 14px; line-height: 1.65; }

    .principles-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; margin-top: 24px; }
    .principle-card { border: 1px solid var(--border); border-radius: var(--radius-md); background: rgba(0,0,0,0.22); padding: 18px; color: var(--muted); }

    .site-footer {
      border-top: 1px solid var(--border);
      padding: 40px 0;
      text-align: center;
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      position: relative;
      z-index: 1;
    }

    @media (max-width: 960px) {
      .hero, .principles-grid, .preview-grid { grid-template-columns: 1fr; }
      .nav { display: none; }
    }
    @media (max-width: 720px) {
      .container { width: min(1120px, calc(100% - 28px)); }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>

  <header class="site-header">
    <div class="container site-header-inner">
      <a class="brand" href="#top">🙂↗ runchr</a>
      <div class="header-right">
        <nav class="nav" aria-label="Main navigation">
          <a href="#about" data-i18n="nav.about">소개</a>
          <a href="#services" data-i18n="nav.services">서비스</a>
          <a href="#principles" data-i18n="nav.principles">원칙</a>
          <a href="#contact" data-i18n="nav.contact">문의</a>
        </nav>
        <div class="lang-switch" aria-label="language switcher">
          <button class="lang-button active" data-lang-button="ko">KR</button>
          <button class="lang-button" data-lang-button="en">EN</button>
        </div>
      </div>
    </div>
  </header>

  <main id="top">
    <section>
      <div class="container hero">
        <div>
          <div class="badge" data-i18n="badge">Build fast. Launch small. Learn deeply.</div>
          <h1 class="hero-title">
            <span data-i18n="hero.title1">runchr builds</span>
            <span class="muted-line" data-i18n="hero.title2">작고, 유용하고, 출시 가능한 서비스</span>
          </h1>
          <p class="hero-desc" data-i18n="hero.desc"></p>
          <div class="hero-actions">
            <a class="button-primary" href="#services" data-i18n="cta.services">서비스 보기</a>
            <a class="button-secondary" href="#contact" data-i18n="cta.contact">문의하기</a>
          </div>
        </div>
        <div class="card">
          <div class="section-label" data-i18n="status.title">Now building</div>
          <p class="section-desc" data-i18n="status.desc"></p>
        </div>
      </div>
    </section>

    <section id="about">
      <div class="container card">
        <div class="section-label" data-i18n="about.label">About</div>
        <h2 class="section-title" data-i18n="about.title"></h2>
        <p class="section-desc" data-i18n="about.desc"></p>
      </div>
    </section>

    <section id="services">
      <div class="container card">
        <div class="section-label" data-i18n="services.label">Services</div>
        <h2 class="section-title" data-i18n="services.title"></h2>
        <p class="section-desc" data-i18n="services.desc"></p>
        <div class="service-preview">
          <h3 data-i18n="services.preview.title">Launch Studio</h3>
          <p data-i18n="services.preview.desc"></p>
          <div id="preview-grid" class="preview-grid"></div>
          <div>
            <a class="button-primary" href="launch-studio.html" data-i18n="services.preview.cta">대표 서비스 자세히 보기</a>
          </div>
        </div>
      </div>
    </section>

    <section id="principles">
      <div class="container card">
        <div class="section-label" data-i18n="principles.label">Principles</div>
        <h2 class="section-title" data-i18n="principles.title"></h2>
        <div id="principles-grid" class="principles-grid"></div>
      </div>
    </section>

    <section id="contact">
      <div class="container card">
        <div class="section-label" data-i18n="contact.label">Contact</div>
        <h2 class="section-title" data-i18n="contact.title"></h2>
        <p class="section-desc" data-i18n="contact.desc"></p>
        <a class="button-primary" href="mailto:hello@runchr.com">hello@runchr.com</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="current-year"></span> runchr</p>
    </div>
  </footer>

  <script>
    const content = {
      ko: {
        nav: { about: "소개", services: "서비스", principles: "원칙", contact: "문의" },
        badge: "Build fast. Launch small. Learn deeply.",
        hero: {
          title1: "runchr builds",
          title2: "작고, 유용하고, 출시 가능한 서비스",
          desc: "runchr는 세상의 문제를 작게 쪼개고, 빠르게 만들고, 실제 사용 속에서 검증하는 서비스 빌드 스튜디오입니다."
        },
        cta: { services: "서비스 보기", contact: "문의하기" },
        status: { title: "Now building", desc: "MVP 제작, AI 활용, 운영 자동화까지 실제로 작동하는 작은 서비스를 빠르게 실험하고 있습니다." },
        about: {
          label: "About",
          title: "아이디어를 서비스로 바꾸는 실행의 이름",
          desc: "runchr는 완벽한 계획보다 빠른 실행을 우선합니다. 좋은 문제를 발견하고, 작은 제품으로 만들고, 실제 반응으로 다음 단계를 결정합니다."
        },
        services: {
          label: "Services",
          title: "서비스 소개는 별도 페이지로 분리했습니다",
          desc: "서비스가 계속 추가될 수 있도록, 상세 소개를 랜딩페이지 밖으로 분리했습니다.",
          items: [
            { slug: "launch-studio", href: "launch-studio.html", tag: "Idea → MVP", name: "Launch Studio", desc: "아이디어를 빠르게 검증해 MVP로 연결합니다." },
            { slug: "workflow-tools", href: "workflow-tools.html", tag: "Micro SaaS", name: "Workflow Tools", desc: "반복 업무를 줄이는 운영 도구를 만듭니다." },
            { slug: "ai-products", href: "ai-products.html", tag: "AI Utility", name: "AI Products", desc: "실사용 흐름 중심의 AI 서비스를 설계합니다." }
          ],
          preview: {
            title: "Launch Studio",
            desc: "아이디어 검증부터 MVP 제작까지, 가장 빠른 첫 출시를 만드는 실행형 서비스입니다.",
            cta: "전체 서비스 페이지 보기"
          }
        },
        principles: {
          label: "Principles",
          title: "runchr가 일하는 방식",
          items: [
            "작게 시작하고 빠르게 검증합니다.",
            "복잡함을 직관적인 사용자 경험으로 바꿉니다.",
            "아이디어보다 실행, 기능 수보다 사용성을 우선합니다."
          ]
        },
        contact: {
          label: "Contact",
          title: "함께 해결하고 싶은 문제가 있다면",
          desc: "새로운 서비스 아이디어나 협업 제안을 언제든지 보내주세요."
        }
      },
      en: {
        nav: { about: "About", services: "Services", principles: "Principles", contact: "Contact" },
        badge: "Build fast. Launch small. Learn deeply.",
        hero: {
          title1: "runchr builds",
          title2: "small, useful, shippable services",
          desc: "runchr is a build studio that breaks problems into small pieces, ships quickly, and validates through real use."
        },
        cta: { services: "View services", contact: "Contact" },
        status: { title: "Now building", desc: "From MVPs to AI-enabled workflows, we keep shipping practical and lightweight services." },
        about: {
          label: "About",
          title: "Execution that turns ideas into services",
          desc: "runchr prioritizes fast execution over perfect planning. We find meaningful problems, build small products, and decide what to do next from real usage."
        },
        services: {
          label: "Services",
          title: "Service introductions now have a dedicated page",
          desc: "To support many upcoming services, detailed descriptions are now separated from the landing page.",
          items: [
            { slug: "launch-studio", href: "launch-studio.html", tag: "Idea → MVP", name: "Launch Studio", desc: "Quickly validate ideas and turn them into MVPs." },
            { slug: "workflow-tools", href: "workflow-tools.html", tag: "Micro SaaS", name: "Workflow Tools", desc: "Build focused tools for repetitive operations." },
            { slug: "ai-products", href: "ai-products.html", tag: "AI Utility", name: "AI Products", desc: "Design AI services around practical workflows." }
          ],
          preview: {
            title: "Launch Studio",
            desc: "An execution-focused service that takes ideas from validation to MVP launch.",
            cta: "Go to services page"
          }
        },
        principles: {
          label: "Principles",
          title: "How runchr works",
          items: [
            "Start small and validate fast.",
            "Turn complexity into intuitive experiences.",
            "Prioritize execution over ideas, and usability over feature count."
          ]
        },
        contact: {
          label: "Contact",
          title: "Have a problem you'd like to solve together?",
          desc: "Send us your next service idea or collaboration inquiry anytime."
        }
      }
    };

    let currentLang = "ko";
    const langButtons = document.querySelectorAll("[data-lang-button]");
    const principlesGrid = document.getElementById("principles-grid");
    const previewGrid = document.getElementById("preview-grid");

    function getByPath(obj, path) {
      return path.split(".").reduce((acc, key) => (acc ? acc[key] : undefined), obj);
    }

    function applyTranslations() {
      document.documentElement.lang = currentLang;
      document.querySelectorAll("[data-i18n]").forEach((node) => {
        const value = getByPath(content[currentLang], node.dataset.i18n);
        if (typeof value === "string") node.textContent = value;
      });

      principlesGrid.innerHTML = content[currentLang].principles.items
        .map((item) => `<div class="principle-card">${item}</div>`)
        .join("");

      previewGrid.innerHTML = content[currentLang].services.items
        .map((item) => `
          <a class="preview-card" href="${item.href}">
            <div class="preview-tag">${item.tag}</div>
            <div class="preview-name">${item.name}</div>
            <div class="preview-desc">${item.desc}</div>
          </a>
        `)
        .join("");
    }

    function syncLanguageButtons() {
      langButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.langButton === currentLang);
      });
    }

    langButtons.forEach((button) => {
      button.addEventListener("click", () => {
        currentLang = button.dataset.langButton;
        syncLanguageButtons();
        applyTranslations();
      });
    });

    document.getElementById("current-year").textContent = new Date().getFullYear();
    syncLanguageButtons();
    applyTranslations();
  </script>
</body>
</html>
